# ============================================================
# SonarQube Scanner Configuration
# ============================================================

# Project identification
sonar.projectKey=vulnerable-demo-app
sonar.projectName=Vulnerable Demo Application
sonar.projectVersion=1.0

# Source settings
sonar.sources=.
sonar.language=py
sonar.sourceEncoding=UTF-8

# Exclusions (don't scan virtual envs etc.)
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**,**/.venv/**

# SonarQube server (update with your Docker instance URL)
sonar.host.url=http://localhost:9000

# Auth token (generate from SonarQube UI > My Account > Security)
# sonar.token=YOUR_TOKEN_HERE
